<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Love U ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:linear-gradient(135deg,#ff9ecf,#ffd6ea,#ffe9f3);
}

.card{
width:360px;
padding:35px;
border-radius:30px;
background:rgba(255,255,255,.25);
backdrop-filter:blur(18px);
box-shadow:0 15px 40px rgba(255,105,180,.35);
text-align:center;
position:relative;
z-index:2;
animation:pop .9s ease;
}

@keyframes pop{
from{
transform:scale(.6);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

h1{
color:#ff2d6f;
font-size:34px;
margin-bottom:10px;
}

h2{
color:#ff4f8b;
font-size:24px;
margin-bottom:20px;
}

#typing{
font-size:19px;
line-height:1.8;
color:#444;
min-height:140px;
}

button{
margin-top:20px;
padding:12px 28px;
border:none;
border-radius:40px;
background:#ff2d6f;
color:white;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.08);
}

.heart{
position:absolute;
font-size:24px;
animation:float 8s linear infinite;
opacity:.8;
}

@keyframes float{

0%{
transform:translateY(100vh) scale(.8);
}

100%{
transform:translateY(-120vh) scale(1.5);
}

}

</style>
</head>

<body>

<div class="heart" style="left:10%">❤️</div>
<div class="heart" style="left:30%;animation-delay:2s;">💖</div>
<div class="heart" style="left:55%;animation-delay:4s;">💕</div>
<div class="heart" style="left:75%;animation-delay:1s;">💗</div>
<div class="heart" style="left:90%;animation-delay:3s;">💞</div>

<div class="card">

<h1>I Love U ❤️</h1>

<h2>The Princess Maisha 👑</h2>

<div id="typing"></div>

<button onclick="love()">
Open My Heart 💌
</button>

<p id="msg"></p>

</div>

<audio id="music">
<source src="piano.mp3" type="audio/mpeg">
</audio>

<script>
const text =
`Every heartbeat whispers your name... ❤️

I Love U
The Princess Maisha 👑💖

You are my happiness,
my smile,
my peace,
and my favorite person.

No matter what happens,
my heart will always choose you.

Forever & Always... ❤️🌹`;

let i = 0;

function typing(){

if(i < text.length){

document.getElementById("typing").innerHTML +=
text.charAt(i) == "\n" ? "<br>" : text.charAt(i);

i++;

setTimeout(typing,45);

}

}

typing();

function love(){

document.getElementById("music").play();

document.getElementById("msg").innerHTML=
"<br>💖 Forever Mine 💖<br><br>I Love U The Princess Maisha ❤️🌹";

document.querySelector(".card").style.transform="scale(1.05)";

setTimeout(()=>{
document.querySelector(".card").style.transform="scale(1)";
},300);

}
/* Floating Sparkles */

for(let i=0;i<20;i++){

let star=document.createElement("div");

star.innerHTML="✨";

star.style.position="fixed";
star.style.left=Math.random()*100+"vw";
star.style.top=Math.random()*100+"vh";
star.style.fontSize=(10+Math.random()*20)+"px";
star.style.opacity="0.6";
star.style.pointerEvents="none";
star.style.animation=`twinkle ${2+Math.random()*3}s infinite`;

document.body.appendChild(star);

}

const style=document.createElement("style");

style.innerHTML=`

@keyframes twinkle{

0%{opacity:.2;transform:scale(.8);}

50%{opacity:1;transform:scale(1.3);}

100%{opacity:.2;transform:scale(.8);}

}

#msg{

font-size:22px;

color:#ff2d6f;

font-weight:bold;

margin-top:20px;

animation:fade 1s;

}

@keyframes fade{

from{

opacity:0;

transform:translateY(20px);

}

to{

opacity:1;

transform:translateY(0);

}

}

`;

document.head.appendChild(style);

</script>

</body>

</html>
<!-- Love Button Section -->

<div class="love-box">

<button onclick="showLove()">💖 Click Here 💖</button>

<p id="loveText"></p>

</div>


<style>

.love-box{

text-align:center;

margin-top:30px;

}


.love-box button{

background:#ff2d6f;

color:white;

border:none;

padding:15px 30px;

border-radius:30px;

font-size:18px;

font-weight:bold;

cursor:pointer;

box-shadow:0 0 15px #ff2d6f;

}


.love-box button:hover{

transform:scale(1.1);

}


#loveText{

font-size:24px;

color:#ff2d6f;

font-weight:bold;

margin-top:20px;

animation:pop .8s;

}


@keyframes pop{

0%{

transform:scale(0);

}

100%{

transform:scale(1);

}

}

</style>


<script>

function showLove(){

document.getElementById("loveText").innerHTML=

"❤️ You are my special one ❤️";

}

</script>
<!-- Photo Slider Section -->

<div class="slider">

<img id="photo" src="photo1.jpg">

</div>


<style>

.slider{

text-align:center;

margin-top:30px;

}


.slider img{

width:250px;

height:300px;

object-fit:cover;

border-radius:20px;

box-shadow:0 0 20px #ff2d6f;

animation:slide 1s;

}


@keyframes slide{

from{

opacity:0;

transform:scale(.8);

}

to{

opacity:1;

transform:scale(1);

}

}

</style>


<script>

let photos=[

"photo1.jpg",

"photo2.jpg",

"photo3.jpg"

];


let index=0;


setInterval(()=>{

index++;

if(index>=photos.length){

index=0;

}


let img=document.getElementById("photo");

img.style.animation="none";

setTimeout(()=>{

img.src=photos[index];

img.style.animation="slide 1s";

},100);


},3000);


</script>
<!-- Final Love Message Section -->

<div class="final">

<h1>💖 Forever With You 💖</h1>

<p>
Tomar sathe kata protita muhurto amar kache onek special.
Tomar hasi amar diner shobcheye shundor ongsho.
Always stay happy and keep smiling ❤️
</p>

<div class="heart">
❤️
</div>

</div>


<style>

.final{

text-align:center;

margin-top:50px;

padding:30px;

font-family:cursive;

}


.final h1{

color:#ff2d6f;

font-size:35px;

text-shadow:0 0 15px pink;

}


.final p{

font-size:20px;

color:white;

line-height:1.6;

background:rgba(255,45,111,0.2);

padding:20px;

border-radius:20px;

box-shadow:0 0 20px #ff2d6f;

}


.heart{

font-size:70px;

margin-top:20px;

animation:beat 1s infinite;

}


@keyframes beat{

0%{

transform:scale(1);

}

50%{

transform:scale(1.3);

}

100%{

transform:scale(1);

}

}


</style>


<script>

// Floating Hearts

for(let i=0;i<25;i++){

let heart=document.createElement("div");

heart.innerHTML="❤️";

heart.style.position="fixed";

heart.style.left=Math.random()*100+"vw";

heart.style.bottom="-20px";

heart.style.fontSize=(15+Math.random()*25)+"px";

heart.style.animation="float 5s linear infinite";

document.body.appendChild(heart);

}


let style=document.createElement("style");

style.innerHTML=`

@keyframes float{

from{

transform:translateY(0);

opacity:1;

}

to{

transform:translateY(-110vh);

opacity:0;

}

}

`;

document.head.appendChild(style);


</script>
</body>

</html>
